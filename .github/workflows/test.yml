
#--------------------------------------------------------------------------------------------------------------------Create a workflow file in .github/workflows/ that automatically builds your application and runs tests on every push to the main branch.
#--------------------------------------------------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run tests
        run: pytest