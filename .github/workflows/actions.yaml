#--------------------------------------------------------------------------------------------------------------------
# Create a workflow file in .github/workflows/ that automatically builds your application and runs tests on every push to the main branch.
#--------------------------------------------------------------------------------------------------------------------
name: CI

on:
  push:
    branches: [main]

jobs:
  # Job 1: Test - Run linting and tests with PostgreSQL service container
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Run database setup
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d test_db -f database_setup.sql

      - name: Run tests
        run: uv run pytest

  # Job 2: Build & Push - Build Docker image and push to ACR
  build-push:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/journal-api:${{ github.sha }} .
          docker tag ${{ secrets.ACR_LOGIN_SERVER }}/journal-api:${{ github.sha }} ${{ secrets.ACR_LOGIN_SERVER }}/journal-api:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/journal-api:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/journal-api:latest

  # Job 3: Deploy - Deploy to AKS cluster
  deploy:
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AZURE_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Create Kubernetes secrets
        run: |
          kubectl create secret generic journal-api-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_API_KEY="${{ secrets.AZURE_OPENAI_API_KEY }}" \
            --from-literal=AZURE_OPENAI_ENDPOINT="${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
            --from-literal=AZURE_OPENAI_DEPLOYMENT="${{ secrets.AZURE_OPENAI_DEPLOYMENT }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Grafana Secrets
        run: |
          kubectl create secret generic grafana-secrets \
              --namespace=monitoring \
              --from-literal=admin-user="${{ secrets.GRAFANA_ADMIN_USER }}" \
              --from-literal=admin-password="${{ secrets.GRAFANA_ADMIN_PASSWORD }}" \
              --dry-run=client -o yaml | kubectl apply -f -

      - name: Replace image placeholder and deploy
        run: |
          sed -i 's|IMAGE_PLACEHOLDER|${{ secrets.ACR_LOGIN_SERVER }}/journal-api:${{ github.sha }}|g' k8s/deployment.yaml
          kubectl apply -f k8s/
